services:
  app:
    build: .
    container_name: app
    depends_on:
      - pg
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - 3000:3000
    command:
      [
        "sh",
        "-c",
        "until nc -z pg 5432; do echo waiting for db; sleep 1; done; node dist/main",
      ]

  pg:
    image: postgres:16.6-alpine3.20
    container_name: pg
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
